name: Mule CI/CD — CloudHub 2.0

on:
  push:
    branches:
      - main        # → Production   (mule.env = prod)
      - develop     # → Sandbox      (mule.env = dev)
      - design      # → Design/DEV   (mule.env = qa)
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'sandbox'
        type: choice
        options:
          - sandbox
          - design
          - prod

# ─────────────────────────────────────────────────────────────────────────────
# All credentials and config are read from:
#   src/main/resources/env-<env>.properties          (non-secret config)
#   src/main/resources/env-<env>-secrets.properties  (credentials — plain text)
#
# Branch → Environment → Anypoint Platform Env → mule.env mapping:
#   develop  →  sandbox  →  SANDBOX      →  dev
#   design   →  design   →  DEV          →  qa
#   main     →  prod     →  Production   →  prod
# ─────────────────────────────────────────────────────────────────────────────

env:
  PROPS_DIR: src/main/resources   # single place to change if path ever moves

jobs:

  # ─────────────────────────────────────────────────────
  # JOB 1 — Resolve environment
  # ─────────────────────────────────────────────────────
  resolve-environment:
    name: Resolve Target Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}

    steps:
      - name: Determine environment from branch or manual input
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            ENV="prod"
          elif [ "${{ github.ref }}" = "refs/heads/design" ]; then
            ENV="design"
          else
            ENV="sandbox"
          fi
          echo "environment=$ENV" >> "$GITHUB_OUTPUT"
          echo "✅ Resolved environment: $ENV"

  # ─────────────────────────────────────────────────────
  # JOB 2 — Build & Test
  # ─────────────────────────────────────────────────────
  build:
    name: Build Mule Application
    runs-on: ubuntu-latest
    needs: resolve-environment

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # ── Load non-secret config ─────────────────────────────────────────────
      - name: Load env-${{ needs.resolve-environment.outputs.environment }}.properties
        run: |
          ENV="${{ needs.resolve-environment.outputs.environment }}"
          PROP_FILE="${PROPS_DIR}/env-${ENV}.properties"

          if [ ! -f "$PROP_FILE" ]; then
            echo "❌ ERROR: Property file not found: $PROP_FILE"
            echo "   Ensure the file exists in src/main/resources/ before pushing."
            exit 1
          fi

          echo "📄 Loading config: $PROP_FILE"
          while IFS='=' read -r key value; do
            [[ "$key" =~ ^#.*$ || -z "$key" ]] && continue
            key=$(echo "$key" | xargs)
            value=$(echo "$value" | xargs)
            echo "${key}=${value}" >> "$GITHUB_ENV"
          done < "$PROP_FILE"

      # ── Load credentials ───────────────────────────────────────────────────
      - name: Load env-${{ needs.resolve-environment.outputs.environment }}-secrets.properties
        run: |
          ENV="${{ needs.resolve-environment.outputs.environment }}"
          SECRET_FILE="${PROPS_DIR}/env-${ENV}-secrets.properties"

          if [ ! -f "$SECRET_FILE" ]; then
            echo "❌ ERROR: Secrets file not found: $SECRET_FILE"
            echo "   Ensure the file exists in src/main/resources/ before pushing."
            exit 1
          fi

          echo "🔐 Loading credentials: $SECRET_FILE"
          while IFS='=' read -r key value; do
            [[ "$key" =~ ^#.*$ || -z "$key" ]] && continue
            key=$(echo "$key" | xargs)
            value=$(echo "$value" | xargs)
            echo "::add-mask::$value"          # masks value in all log output
            echo "${key}=${value}" >> "$GITHUB_ENV"
          done < "$SECRET_FILE"

      # ── Maven settings.xml (Exchange auth via Connected App) ───────────────
      - name: Configure Maven settings.xml
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << EOF
          <settings>
            <servers>
              <server>
                <id>anypoint-exchange-v3</id>
                <username>~~~Client~~~</username>
                <password>${ANYPOINT_CLIENT_ID}~?~${ANYPOINT_CLIENT_SECRET}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Build with Maven
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            mvn clean package -DskipTests --no-transfer-progress
          else
            mvn clean package --no-transfer-progress
          fi

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: mule-artifact-${{ needs.resolve-environment.outputs.environment }}
          path: target/*.jar
          retention-days: 7

  # ─────────────────────────────────────────────────────
  # JOB 3 — Deploy to CloudHub 2.0
  # ─────────────────────────────────────────────────────
  deploy:
    name: Deploy → CloudHub 2.0 [${{ needs.resolve-environment.outputs.environment }}]
    runs-on: ubuntu-latest
    needs: [resolve-environment, build]
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: mule-artifact-${{ needs.resolve-environment.outputs.environment }}
          path: target/

      # ── Re-load config (each job runs on a fresh runner) ───────────────────
      - name: Load env-${{ needs.resolve-environment.outputs.environment }}.properties
        run: |
          ENV="${{ needs.resolve-environment.outputs.environment }}"
          PROP_FILE="${PROPS_DIR}/env-${ENV}.properties"

          if [ ! -f "$PROP_FILE" ]; then
            echo "❌ ERROR: Property file not found: $PROP_FILE"
            exit 1
          fi

          echo "📄 Loading config: $PROP_FILE"
          while IFS='=' read -r key value; do
            [[ "$key" =~ ^#.*$ || -z "$key" ]] && continue
            key=$(echo "$key" | xargs)
            value=$(echo "$value" | xargs)
            echo "${key}=${value}" >> "$GITHUB_ENV"
          done < "$PROP_FILE"

      - name: Load env-${{ needs.resolve-environment.outputs.environment }}-secrets.properties
        run: |
          ENV="${{ needs.resolve-environment.outputs.environment }}"
          SECRET_FILE="${PROPS_DIR}/env-${ENV}-secrets.properties"

          if [ ! -f "$SECRET_FILE" ]; then
            echo "❌ ERROR: Secrets file not found: $SECRET_FILE"
            exit 1
          fi

          echo "🔐 Loading credentials: $SECRET_FILE"
          while IFS='=' read -r key value; do
            [[ "$key" =~ ^#.*$ || -z "$key" ]] && continue
            key=$(echo "$key" | xargs)
            value=$(echo "$value" | xargs)
            echo "::add-mask::$value"
            echo "${key}=${value}" >> "$GITHUB_ENV"
          done < "$SECRET_FILE"

      # ── Anypoint CLI v4 ────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Anypoint CLI v4
        run: |
          npm install -g anypoint-cli-v4
          anypoint-cli-v4 --version

      - name: Configure Anypoint CLI (from property files)
        run: |
          echo "🔧 Configuring Anypoint CLI..."
          anypoint-cli-v4 conf client_id     "$ANYPOINT_CLIENT_ID"
          anypoint-cli-v4 conf client_secret "$ANYPOINT_CLIENT_SECRET"
          anypoint-cli-v4 conf organization  "$ANYPOINT_ORG_ID"
          echo "✅ CLI configured — Org: $ANYPOINT_ORG_ID | Env: $CH2_ENVIRONMENT"

      - name: Locate deployable JAR
        id: locate-jar
        run: |
          JAR_FILE=$(find target -name "*.jar" \
            ! -name "*sources*" \
            ! -name "*mule-plugin*" | head -1)
          if [ -z "$JAR_FILE" ]; then
            echo "❌ ERROR: No deployable JAR found in target/"
            exit 1
          fi
          echo "jar_file=$JAR_FILE" >> "$GITHUB_OUTPUT"
          echo "📦 JAR: $JAR_FILE"

      # ── Check existing app ─────────────────────────────────────────────────
      - name: Check if application exists on CloudHub 2.0
        id: check-app
        run: |
          echo "🔍 Checking '$CH2_APP_NAME' in Anypoint env '$CH2_ENVIRONMENT'..."

          APP_EXISTS=$(anypoint-cli-v4 runtime-mgr:cloudhub2-application:list \
            --environment "$CH2_ENVIRONMENT" \
            --output json 2>/dev/null | \
            jq --arg name "$CH2_APP_NAME" \
              '.[] | select(.name == $name) | .name' -r 2>/dev/null || echo "")

          if [ -n "$APP_EXISTS" ]; then
            echo "app_exists=true"  >> "$GITHUB_OUTPUT"
            echo "🔄 App exists — will UPDATE."
          else
            echo "app_exists=false" >> "$GITHUB_OUTPUT"
            echo "🆕 App not found — will CREATE."
          fi

      # ── CREATE — first-time deploy ─────────────────────────────────────────
      - name: Deploy — CREATE new application
        if: steps.check-app.outputs.app_exists == 'false'
        run: |
          echo "🚀 Creating '$CH2_APP_NAME' on CloudHub 2.0..."
          echo "   Anypoint Env : $CH2_ENVIRONMENT"
          echo "   Target       : $CH2_TARGET"
          echo "   mule.env     : $MULE_ENV"

          anypoint-cli-v4 runtime-mgr:cloudhub2-application:deploy \
            "$CH2_APP_NAME" \
            "${{ steps.locate-jar.outputs.jar_file }}" \
            --environment       "$CH2_ENVIRONMENT" \
            --target            "$CH2_TARGET" \
            --mule-version      "$CH2_MULE_VERSION" \
            --replicas          "$CH2_REPLICAS" \
            --vcores            "$CH2_VCORES" \
            --deployment-model  "$CH2_DEPLOYMENT_MODEL" \
            --property          "mule.env=$MULE_ENV" \
            --property          "anypoint.platform.client_id=$ANYPOINT_CLIENT_ID" \
            --property          "anypoint.platform.client_secret=$ANYPOINT_CLIENT_SECRET"

          echo "✅ Application created."

      # ── UPDATE — subsequent deploys ────────────────────────────────────────
      - name: Deploy — UPDATE existing application
        if: steps.check-app.outputs.app_exists == 'true'
        run: |
          echo "🔄 Updating '$CH2_APP_NAME' on CloudHub 2.0..."
          echo "   Anypoint Env : $CH2_ENVIRONMENT"
          echo "   Target       : $CH2_TARGET"
          echo "   mule.env     : $MULE_ENV"

          anypoint-cli-v4 runtime-mgr:cloudhub2-application:update \
            "$CH2_APP_NAME" \
            "${{ steps.locate-jar.outputs.jar_file }}" \
            --environment       "$CH2_ENVIRONMENT" \
            --target            "$CH2_TARGET" \
            --mule-version      "$CH2_MULE_VERSION" \
            --replicas          "$CH2_REPLICAS" \
            --vcores            "$CH2_VCORES" \
            --deployment-model  "$CH2_DEPLOYMENT_MODEL" \
            --property          "mule.env=$MULE_ENV" \
            --property          "anypoint.platform.client_id=$ANYPOINT_CLIENT_ID" \
            --property          "anypoint.platform.client_secret=$ANYPOINT_CLIENT_SECRET"

          echo "✅ Application updated."

      # ── Poll until RUNNING ─────────────────────────────────────────────────
      - name: Wait for RUNNING status
        run: |
          echo "⏳ Polling deployment status for '$CH2_APP_NAME'..."
          MAX_RETRIES=20
          SLEEP_SECONDS=30
          COUNT=0

          while [ $COUNT -lt $MAX_RETRIES ]; do
            STATUS=$(anypoint-cli-v4 runtime-mgr:cloudhub2-application:describe \
              "$CH2_APP_NAME" \
              --environment "$CH2_ENVIRONMENT" \
              --output json 2>/dev/null | \
              jq -r '.status // "UNKNOWN"')

            echo "  [$((COUNT+1))/$MAX_RETRIES] Status: $STATUS"

            case "$STATUS" in
              RUNNING)
                echo "✅ Application is RUNNING."
                exit 0
                ;;
              FAILED|DEPLOY_FAILED)
                echo "❌ Deployment FAILED. Check Runtime Manager logs."
                exit 1
                ;;
            esac

            COUNT=$((COUNT+1))
            sleep $SLEEP_SECONDS
          done

          echo "⚠️  Timeout after $((MAX_RETRIES * SLEEP_SECONDS))s. Last status: $STATUS"
          exit 1

      # ── Job Summary ────────────────────────────────────────────────────────
      - name: Write deployment summary
        if: always()
        run: |
          echo "## 🚀 CloudHub 2.0 Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Pipeline Env** | \`${{ needs.resolve-environment.outputs.environment }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Anypoint Platform Env** | \`$CH2_ENVIRONMENT\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **mule.env (Runtime Manager)** | \`$MULE_ENV\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Application Name** | \`$CH2_APP_NAME\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Target** | \`$CH2_TARGET\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Replicas** | \`$CH2_REPLICAS\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **vCores** | \`$CH2_VCORES\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Mule Version** | \`$CH2_MULE_VERSION\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
